<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://api.open-meteo.com; base-uri 'none'; form-action 'none'">
  <title>舞浜の天気・周辺イベント情報</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --panel: #101c31;
      --panel-2: #13243f;
      --line: #29415f;
      --text: #f7fbff;
      --muted: #b7c7dc;
      --subtle: #8fa4bf;
      --blue: #2563eb;
      --royal: #1e3a8a;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 320px;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.28), transparent 32rem),
        linear-gradient(135deg, #07111f 0%, #111827 48%, #1a1230 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    .page {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 22px clamp(14px, 3vw, 28px) 42px;
    }

    /* 見出し文言を必ずデータボタンの上に表示する（常に縦積み）。
       これで画面幅に関わらずボタンが細長くならない。 */
    .app-header {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 14px;
      padding: 10px 0 20px;
    }

    .header-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.55rem, 4vw, 2.55rem);
    }

    h2 {
      margin: 0 0 12px;
      font-size: 1.2rem;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      max-width: 740px;
    }

    .link-button {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-weight: 700;
      padding: 0 14px;
      text-decoration: none;
    }

    .link-button:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    .panel {
      display: grid;
      gap: 14px;
      margin: 0 0 18px;
      padding: clamp(16px, 3vw, 22px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(16, 28, 49, 0.92);
      box-shadow: var(--shadow);
    }

    .weather-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }

    .weather-cell {
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(5, 12, 25, 0.34);
    }

    .weather-day {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .weather-icon {
      font-size: 1.85rem;
      line-height: 1.1;
      margin: 2px 0 4px;
    }

    .weather-temp {
      font-size: 0.95rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .weather-rain {
      color: var(--subtle);
      font-size: 0.78rem;
      margin-top: 4px;
    }

    .current-weather {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 14px;
      align-items: center;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(30, 58, 138, 0.6), rgba(88, 28, 135, 0.55));
    }

    .current-icon {
      font-size: 3.1rem;
      line-height: 1;
    }

    .current-temp {
      font-size: 2rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      margin: 0;
    }

    .current-meta {
      color: #dbeafe;
      font-size: 0.86rem;
    }

    .event-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 6px;
    }

    .event-tab {
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }

    .event-tab[aria-pressed="true"] {
      background: linear-gradient(180deg, #3157c7, var(--royal));
      border-color: rgba(255, 255, 255, 0.36);
    }

    .event-links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
    }

    .event-link {
      display: block;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(5, 12, 25, 0.34);
      color: var(--text);
      text-decoration: none;
      transition: border-color 120ms ease, transform 120ms ease;
    }

    .event-link:hover {
      border-color: rgba(255, 255, 255, 0.35);
      transform: translateY(-1px);
    }

    .event-link-title {
      font-weight: 800;
      margin-bottom: 4px;
    }

    .event-link-desc {
      color: var(--subtle);
      font-size: 0.82rem;
    }

    .status {
      color: var(--subtle);
      font-size: 0.86rem;
    }

    .status.is-error {
      color: #fecaca;
    }

    .is-hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="app-header">
      <div>
        <h1 id="headerTitle">舞浜の天気 ／ 周辺イベント</h1>
        <p class="lead" id="headerLead">来園日の参考情報。舞浜（浦安市）の天気と、千葉・東京・埼玉・神奈川のイベント情報リンクをまとめています。</p>
      </div>
      <div class="header-nav">
        <a href="./index.html" class="link-button" id="navIndex"><span aria-hidden="true">←</span> 待ち時間に戻る</a>
        <a href="./tier.html" class="link-button" id="navTier"><span aria-hidden="true">🎯</span> 混雑ティア</a>
        <a href="./history.html" class="link-button" id="navHistory"><span aria-hidden="true">📊</span> 過去データ</a>
      </div>
    </header>
    <script>
      (() => {
        const p = new URLSearchParams(location.search).get('park');
        const VALID = ['tdl','tds','usj','dlr','dca','mk','epcot','dhs','ak','dlp','wds','hkdl','shdl'];
        const park = VALID.includes(p) ? p : 'tdl';
        const suffix = park === 'tdl' ? '' : `?park=${park}`;
        [['navIndex','./index.html'],['navTier','./tier.html'],['navHistory','./history.html']]
          .forEach(([id, base]) => { const el = document.getElementById(id); if (el) el.setAttribute('href', base + suffix); });
      })();
    </script>

    <section class="panel" aria-labelledby="weatherTitle">
      <h2 id="weatherTitle">天気</h2>
      <div id="currentWeather" class="current-weather is-hidden">
        <div class="current-icon" id="currentIcon">☁️</div>
        <div>
          <p class="current-temp"><span id="currentTemp">--</span>℃</p>
          <div class="current-meta">
            <span id="currentDesc">--</span> ／ 体感 <span id="apparentTemp">--</span>℃ ／ 降水確率(1h) <span id="currentRain">--</span>%
          </div>
        </div>
      </div>
      <div id="weatherStatus" class="status">天気情報を取得しています…</div>
      <div id="forecast" class="weather-grid" aria-label="今後7日間の予報"></div>
      <p class="status">提供: <a href="https://open-meteo.com/" target="_blank" rel="noopener noreferrer" style="color: var(--subtle);">Open-Meteo</a></p>
    </section>

    <section class="panel" aria-labelledby="eventsTitle">
      <h2 id="eventsTitle">周辺イベント情報</h2>
      <div class="event-tabs" role="tablist" aria-label="エリア選択" id="eventTabs"></div>
      <div id="eventLinks" class="event-links"></div>
      <p class="status">※ イベント情報は外部の情報サイトへのリンクです。リンク先で詳細をご確認ください。</p>
    </section>
  </div>

  <script>
    (() => {
      const PARK = (() => {
        const p = new URLSearchParams(location.search).get('park');
        const VALID = ['tdl','tds','usj','dlr','dca','mk','epcot','dhs','ak','dlp','wds','hkdl','shdl'];
        return VALID.includes(p) ? p : 'tdl';
      })();
      const WMO_CODE = {
        0: { icon: '☀️', label: '快晴' },
        1: { icon: '🌤️', label: 'おおむね晴れ' },
        2: { icon: '⛅', label: '一部曇り' },
        3: { icon: '☁️', label: '曇り' },
        45: { icon: '🌫️', label: '霧' },
        48: { icon: '🌫️', label: '着氷霧' },
        51: { icon: '🌦️', label: '小雨' },
        53: { icon: '🌦️', label: '雨' },
        55: { icon: '🌧️', label: '強い雨' },
        61: { icon: '🌧️', label: '弱い雨' },
        63: { icon: '🌧️', label: '雨' },
        65: { icon: '🌧️', label: '強い雨' },
        71: { icon: '🌨️', label: '弱い雪' },
        73: { icon: '🌨️', label: '雪' },
        75: { icon: '❄️', label: '強い雪' },
        77: { icon: '🌨️', label: '雪あられ' },
        80: { icon: '🌦️', label: 'にわか雨(弱)' },
        81: { icon: '🌧️', label: 'にわか雨' },
        82: { icon: '⛈️', label: '激しいにわか雨' },
        85: { icon: '🌨️', label: 'にわか雪(弱)' },
        86: { icon: '❄️', label: 'にわか雪(強)' },
        95: { icon: '⛈️', label: '雷雨' },
        96: { icon: '⛈️', label: '雷雨+雹' },
        99: { icon: '⛈️', label: '激しい雷雨' }
      };

      // パーク所在地に応じた天気の座標・見出し・周辺イベントリンク。
      // TDL / TDS は舞浜（浦安市）、USJ は大阪（此花区）。
      const MAIHAMA = {
        docTitle: '舞浜の天気・周辺イベント情報',
        headerTitle: '舞浜の天気 ／ 周辺イベント',
        headerLead: '来園日の参考情報。舞浜（浦安市）の天気と、千葉・東京・埼玉・神奈川のイベント情報リンクをまとめています。',
        weatherTitle: '舞浜の天気',
        lat: 35.6329,
        lon: 139.8826,
        areas: [
          { key: 'chiba', label: '千葉県', events: [
            { title: 'まるごとe!ちば（千葉県公式観光物産サイト）', url: 'https://maruchiba.jp/event/', desc: '千葉県内のイベント・観光情報' },
            { title: '浦安市公式 イベント情報', url: 'https://www.city.urayasu.lg.jp/kanko/event/', desc: '舞浜エリア（浦安市）のイベント' },
            { title: 'Walkerplus 千葉のイベント', url: 'https://www.walkerplus.com/event_list/ar0312/', desc: '千葉県のイベントカレンダー' }
          ] },
          { key: 'tokyo', label: '東京都', events: [
            { title: 'GO TOKYO（東京観光公式）イベント', url: 'https://www.gotokyo.org/jp/destinations/eastern-tokyo/events.html', desc: '東京都内のイベント情報' },
            { title: 'Walkerplus 東京のイベント', url: 'https://www.walkerplus.com/event_list/ar0313/', desc: '東京都のイベントカレンダー' },
            { title: 'Lets Enjoy TOKYO', url: 'https://www.enjoytokyo.jp/feature/event/', desc: '東京のおでかけ・イベント' }
          ] },
          { key: 'saitama', label: '埼玉県', events: [
            { title: 'ちょこたび埼玉（県観光協会）', url: 'https://chocotabi-saitama.jp/event', desc: '埼玉県内のイベント' },
            { title: 'Walkerplus 埼玉のイベント', url: 'https://www.walkerplus.com/event_list/ar0311/', desc: '埼玉県のイベントカレンダー' }
          ] },
          { key: 'kanagawa', label: '神奈川県', events: [
            { title: 'かながわのイベント（県公式）', url: 'https://www.pref.kanagawa.jp/docs/cnt/event/index.html', desc: '神奈川県のイベント情報' },
            { title: 'Walkerplus 神奈川のイベント', url: 'https://www.walkerplus.com/event_list/ar0314/', desc: '神奈川県のイベントカレンダー' }
          ] }
        ]
      };
      const PARK_INFO = {
        tdl: MAIHAMA,
        tds: MAIHAMA,
        usj: {
          docTitle: 'USJ（大阪）の天気・周辺イベント情報',
          headerTitle: 'USJ周辺の天気 ／ 周辺イベント',
          headerLead: '来園日の参考情報。USJ（大阪市此花区）の天気と、大阪・京都・兵庫・奈良のイベント情報リンクをまとめています。',
          weatherTitle: 'USJ（大阪）の天気',
          lat: 34.6658,
          lon: 135.4323,
          areas: [
            { key: 'osaka', label: '大阪府', events: [
              { title: 'OSAKA-INFO（大阪観光局）イベント', url: 'https://osaka-info.jp/event/', desc: '大阪のイベント・観光情報' },
              { title: 'Walkerplus 大阪のイベント', url: 'https://www.walkerplus.com/event_list/ar0427/', desc: '大阪府のイベントカレンダー' }
            ] },
            { key: 'kyoto', label: '京都府', events: [
              { title: '京都観光Navi（市公式）イベント', url: 'https://ja.kyoto.travel/event/', desc: '京都のイベント情報' },
              { title: 'Walkerplus 京都のイベント', url: 'https://www.walkerplus.com/event_list/ar0426/', desc: '京都府のイベントカレンダー' }
            ] },
            { key: 'hyogo', label: '兵庫県', events: [
              { title: 'ひょうごツーリズムガイド イベント', url: 'https://www.hyogo-tourism.jp/event/', desc: '兵庫のイベント情報' },
              { title: 'Walkerplus 兵庫のイベント', url: 'https://www.walkerplus.com/event_list/ar0428/', desc: '兵庫県のイベントカレンダー' }
            ] },
            { key: 'nara', label: '奈良県', events: [
              { title: '奈良県観光公式（あをによし なら旅ネット）', url: 'https://yamatoji.nara-kankou.or.jp/event/', desc: '奈良のイベント情報' },
              { title: 'Walkerplus 奈良のイベント', url: 'https://www.walkerplus.com/event_list/ar0429/', desc: '奈良県のイベントカレンダー' }
            ] }
          ]
        }
      };
      // 海外パークは天気＋公式サイトのリンクをまとめて表示する。
      function overseas(nameJa, lat, lon, official, calendar) {
        return {
          docTitle: `${nameJa}の天気・公式情報`,
          headerTitle: `${nameJa}の天気 ／ 公式情報`,
          headerLead: `来園日の参考情報。${nameJa}の天気と公式サイトのリンクをまとめています。`,
          weatherTitle: `${nameJa}の天気`,
          lat,
          lon,
          areas: [
            { key: 'official', label: '公式・情報', events: [
              { title: `${nameJa} 公式サイト`, url: official, desc: 'チケット・運営時間・カレンダー' },
              { title: 'パーク・カレンダー / 運営時間', url: calendar, desc: '来園日の運営時間・イベントを確認' }
            ] }
          ]
        };
      }
      Object.assign(PARK_INFO, {
        dlr: overseas('アナハイム・ディズニーランド', 33.8121, -117.9190, 'https://disneyland.disney.go.com/', 'https://disneyland.disney.go.com/calendars/'),
        dca: overseas('ディズニー・カリフォルニア・アドベンチャー', 33.8060, -117.9189, 'https://disneyland.disney.go.com/', 'https://disneyland.disney.go.com/calendars/'),
        mk: overseas('マジックキングダム（WDW）', 28.4177, -81.5812, 'https://disneyworld.disney.go.com/', 'https://disneyworld.disney.go.com/calendars/'),
        epcot: overseas('エプコット（WDW）', 28.3747, -81.5494, 'https://disneyworld.disney.go.com/', 'https://disneyworld.disney.go.com/calendars/'),
        dhs: overseas('ディズニー・ハリウッド・スタジオ（WDW）', 28.3575, -81.5586, 'https://disneyworld.disney.go.com/', 'https://disneyworld.disney.go.com/calendars/'),
        ak: overseas('ディズニー・アニマルキングダム（WDW）', 28.3590, -81.5907, 'https://disneyworld.disney.go.com/', 'https://disneyworld.disney.go.com/calendars/'),
        dlp: overseas('ディズニーランド・パリ', 48.8722, 2.7758, 'https://www.disneylandparis.com/', 'https://www.disneylandparis.com/en-gb/calendar/'),
        wds: overseas('アドベンチャー・ワールド・パリ', 48.8682, 2.7800, 'https://www.disneylandparis.com/', 'https://www.disneylandparis.com/en-gb/calendar/'),
        hkdl: overseas('香港ディズニーランド', 22.3130, 114.0413, 'https://www.hongkongdisneyland.com/', 'https://www.hongkongdisneyland.com/calendar/'),
        shdl: overseas('上海ディズニーランド', 31.1443, 121.6573, 'https://www.shanghaidisneyresort.com/', 'https://www.shanghaidisneyresort.com/en/calendar/')
      });
      const CFG = PARK_INFO[PARK] || MAIHAMA;
      const EVENTS = Object.fromEntries(CFG.areas.map((a) => [a.key, a.events]));

      const els = {
        weatherStatus: document.getElementById('weatherStatus'),
        currentWeather: document.getElementById('currentWeather'),
        currentIcon: document.getElementById('currentIcon'),
        currentTemp: document.getElementById('currentTemp'),
        currentDesc: document.getElementById('currentDesc'),
        apparentTemp: document.getElementById('apparentTemp'),
        currentRain: document.getElementById('currentRain'),
        forecast: document.getElementById('forecast'),
        eventLinks: document.getElementById('eventLinks'),
        eventTabs: document.getElementById('eventTabs')
      };

      init();

      function init() {
        applyChrome();
        buildTabs();
        if (CFG.areas[0]) renderEvents(CFG.areas[0].key);
        fetchWeather();
      }

      function applyChrome() {
        document.title = CFG.docTitle;
        const h1 = document.getElementById('headerTitle');
        if (h1) h1.textContent = CFG.headerTitle;
        const lead = document.getElementById('headerLead');
        if (lead) lead.textContent = CFG.headerLead;
        const wt = document.getElementById('weatherTitle');
        if (wt) wt.textContent = CFG.weatherTitle;
      }

      function buildTabs() {
        els.eventTabs.replaceChildren();
        CFG.areas.forEach((area, i) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'event-tab';
          btn.setAttribute('role', 'tab');
          btn.setAttribute('aria-pressed', i === 0 ? 'true' : 'false');
          btn.dataset.area = area.key;
          btn.textContent = area.label;
          btn.addEventListener('click', () => {
            els.eventTabs.querySelectorAll('.event-tab').forEach((t) => t.setAttribute('aria-pressed', t === btn ? 'true' : 'false'));
            renderEvents(area.key);
          });
          els.eventTabs.appendChild(btn);
        });
      }

      function renderEvents(area) {
        const list = EVENTS[area] || [];
        els.eventLinks.replaceChildren();
        const frag = document.createDocumentFragment();
        list.forEach((event) => {
          const a = document.createElement('a');
          a.className = 'event-link';
          a.href = event.url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          const title = document.createElement('div');
          title.className = 'event-link-title';
          title.textContent = event.title;
          const desc = document.createElement('div');
          desc.className = 'event-link-desc';
          desc.textContent = event.desc;
          a.append(title, desc);
          frag.appendChild(a);
        });
        els.eventLinks.appendChild(frag);
      }

      async function fetchWeather() {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${CFG.lat}&longitude=${CFG.lon}&current=temperature_2m,apparent_temperature,weather_code,precipitation_probability&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FTokyo&forecast_days=7`;
        try {
          const response = await fetch(url);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = await response.json();
          renderCurrent(data.current);
          renderForecast(data.daily);
          els.weatherStatus.classList.add('is-hidden');
        } catch (error) {
          els.weatherStatus.textContent = `天気情報を取得できませんでした（${error.message || error}）`;
          els.weatherStatus.classList.add('is-error');
        }
      }

      function renderCurrent(current) {
        if (!current) return;
        const code = WMO_CODE[current.weather_code] || { icon: '❓', label: '不明' };
        els.currentIcon.textContent = code.icon;
        els.currentDesc.textContent = code.label;
        els.currentTemp.textContent = formatTemp(current.temperature_2m);
        els.apparentTemp.textContent = formatTemp(current.apparent_temperature);
        els.currentRain.textContent = Number.isFinite(current.precipitation_probability)
          ? String(Math.round(current.precipitation_probability))
          : '--';
        els.currentWeather.classList.remove('is-hidden');
      }

      function renderForecast(daily) {
        if (!daily || !Array.isArray(daily.time)) return;
        els.forecast.replaceChildren();
        const frag = document.createDocumentFragment();
        daily.time.forEach((iso, i) => {
          const code = WMO_CODE[daily.weather_code[i]] || { icon: '❓', label: '?' };
          const cell = document.createElement('div');
          cell.className = 'weather-cell';
          const day = document.createElement('div');
          day.className = 'weather-day';
          day.textContent = formatDate(iso);
          const icon = document.createElement('div');
          icon.className = 'weather-icon';
          icon.textContent = code.icon;
          icon.title = code.label;
          const temp = document.createElement('div');
          temp.className = 'weather-temp';
          temp.textContent = `${formatTemp(daily.temperature_2m_max[i])} / ${formatTemp(daily.temperature_2m_min[i])}℃`;
          const rain = document.createElement('div');
          rain.className = 'weather-rain';
          const rainVal = daily.precipitation_probability_max[i];
          rain.textContent = `降水 ${Number.isFinite(rainVal) ? Math.round(rainVal) : '--'}%`;
          cell.append(day, icon, temp, rain);
          frag.appendChild(cell);
        });
        els.forecast.appendChild(frag);
      }

      function formatTemp(v) {
        return Number.isFinite(v) ? String(Math.round(v * 10) / 10) : '--';
      }

      function formatDate(iso) {
        const d = new Date(`${iso}T00:00:00+09:00`);
        if (Number.isNaN(d.getTime())) return iso;
        const day = ['日', '月', '火', '水', '木', '金', '土'][d.getDay()];
        return `${d.getMonth() + 1}/${d.getDate()}(${day})`;
      }
    })();
  </script>
  <button type="button" id="backToTop" class="back-to-top" aria-label="上部へ戻る" title="上部へ戻る">
    <span aria-hidden="true">↑</span>
  </button>
  <style>
    .back-to-top {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: 48px;
      height: 48px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: #2563eb;
      color: #fff;
      font-size: 1.4rem;
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
      z-index: 60;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .back-to-top.is-visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .back-to-top:hover { background: #1d4ed8; }
    @media (max-width: 420px) {
      .back-to-top { right: 14px; bottom: 14px; width: 44px; height: 44px; }
    }
  </style>
  <script>
    (() => {
      const btn = document.getElementById('backToTop');
      if (!btn) return;
      const onScroll = () => {
        btn.classList.toggle('is-visible', window.scrollY > 300);
      };
      btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
    })();
  </script>
</body>
</html>
